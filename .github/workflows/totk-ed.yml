# This is a basic workflow to help you get started with Actions

name: Diy totk-ed CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths:
      - '.github/workflows/totk-ed.yml'
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: windows-2022

    strategy:
      matrix:
        target: ["msvc"] # TODO: Add msys2
    defaults:
      run:
        shell: ${{ (matrix.target == 'msys2' && 'msys2') || 'bash' }} {0}
    
    # env:
    # #   QT_VERSION: 6.6.1
    # #   QT_ARCH: msvc2019_64
    # #   QT_DIR: ${{ github.workspace }}\Qt\6.6.1\msvc2019_64
    #   WINDEPLOYQT: ${{ github.workspace }}\Qt\6.6.1\msvc2019_64\bin\windeployqt.exe


    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out source code
        uses: actions/checkout@v4
      
      # # https://mirrors.cloud.tencent.com/qt/online/qtsdkrepository/windows_x86/desktop/qt6_661/
      # # https://github.com/marketplace/actions/install-qt
      # # Windows w/ Qt >= 5.15 && Qt < 6.8: win64_msvc2019_64
      # # Windows w/ Qt >= 6.8: win64_msvc2022_64
      # # Windows (ARM64) w/ Qt >= 6.8: win64_msvc2022_arm64
      # - name: Install Qt
      #   uses: jurplel/install-qt-action@v4
      #   with:
      #     version: '6.6.1'  # 根据你的 Qt 版本调整
      #     arch: 'win64_msvc2019_64'  # 根据你的架构调整

      # Runs a single command using the runners shell
      # pwd
      # D:/a/actions/actions/
      - name: Clone the repository
        run: |
          # git clone --recursive https://git.citron-emu.org/Citron/Citron.git
          # git clone --recursive https://git.citron-emu.org/citron/emu.git
          git clone --recursive https://git.eden-emu.dev/eden-emu/eden

      # https://github.com/microsoft/setup-msbuild/tree/v1.1.3
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1.1.3
      
      # https://github.com/marketplace/actions/install-vulkan-sdk
      - name: Install Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          # version: 1.4.309.0
          version: latest
      
      - name: Build x86 and x64
        shell: bash
        # # 使用mingw的clang，而不是msvc
        # env:
        #   COMPILER: clang
        run: |
          pwd
          ls -alh
          # cd Citron
          # cd emu
          cd eden
          echo "编译前打印"
          # dir
          ls -alh
          # ls -R .

          # 工作目录： GITHUB_WORKSPACE，${{ github.workspace }}
          git apply ../.github/workflows/tools/cheat_eden.patch
          cat src/core/memory/cheat_engine.cpp
          cat src/core/memory/cheat_engine.h

          echo "开始msvc编译"
          # 使用 MSVC 的简单命令行构建
          mkdir build
          cd build
          # cmake .. -G "Visual Studio 17 2022" -A x64
          cmake .. -DCMAKE_BUILD_TYPE="Release" -DENABLE_QT_TRANSLATION=ON -DUSE_DISCORD_PRESENCE=ON -DYUZU_USE_BUNDLED_SDL2=ON -DYUZU_USE_EXTERNAL_SDL2=OFF -DYUZU_TESTS=OFF -DYUZU_CMD=OFF -DYUZU_ROOM_STANDALONE=OFF -DYUZU_USE_QT_MULTIMEDIA=ON -G "Visual Studio 17 2022" -A x64
          # cmake .. -DCMAKE_BUILD_TYPE=RelWithDebInfo -DENABLE_QT_TRANSLATION=ON -DUSE_DISCORD_PRESENCE=ON -DYUZU_USE_BUNDLED_SDL2=ON -DBUILD_TESTING=OFF -DYUZU_TESTS=OFF -DDYNARMIC_TESTS=OFF -DYUZU_CMD=OFF -DYUZU_ROOM_STANDALONE=OFF -DYUZU_USE_QT_MULTIMEDIA=false -DYUZU_USE_QT_WEB_ENGINE=false -DYUZU_ENABLE_LTO=ON '-DCMAKE_EXE_LINKER_FLAGS= /LTCG' -DDYNARMIC_ENABLE_LTO=ON -DYUZU_USE_BUNDLED_QT=false -DUSE_CCACHE=false -DENABLE_UPDATE_CHECKER=true -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_C_COMPILER=clang-cl -DCMAKE_CXX_FLAGS=-O3 -DCMAKE_C_FLAGS=-O3 -G "Visual Studio 17 2022" -A x64

          cmake --build . --config Release

          # echo "开始mingw编译"
          # # C compiler is: /c/mingw64/bin/cc，c++
          # echo "C compiler is: $(command -v cc || echo 'cc not found')"
          # echo "CXX compiler is: $(command -v c++ || echo 'c++ not found')"
          # .ci/windows/build.sh
          # echo "编译成功，开始打包！"
          # .ci/windows/package.sh

          echo "编译成功后打印"
          # dir
          # ls -R .
          ls -alh build
          ls -alh build/bin
          # ls -alh artifacts

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Eden-my
          path: |
            # Citron/build/bin/Release
            # Citron/build/dist
            # emu/build/bin/Release
            eden/build/bin/Release
            # eden/artifacts
